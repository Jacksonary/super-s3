# config.yaml — Super S3 配置示例
# 将本文件拷贝为 config.yaml 并填入真实的 ak/sk

# 华为云 OBS
- name: "华为云 OBS"        # 可选，不填则自动根据 endpoint 识别云厂商
  ak: saffvdvasdsa
  sk: YOUR_SECRET_KEY
  buckets:
    - my-obs-bucket    # 只展示列表中的桶；留空则列出该账号下所有桶
  endpoint: "https://obs.cn-east-3.myhuaweicloud.com"
  region: cn-east-3

# 阿里云 OSS（内网 endpoint）
- name: "阿里云 OSS"
  ak: atwhjuwqhiuda
  sk: YOUR_SECRET_KEY
  buckets:
    - my-oss-bucket
  endpoint: "https://oss-cn-beijing-internal.aliyuncs.com"
  region: oss-cn-beijing

# 火山云 TOS
- name: "火山云 TOS"
  ak: AK_EXAMPLE
  sk: YOUR_SECRET_KEY
  buckets: []             # 留空 = 列出所有桶
  endpoint: "https://tos-s3-cn-beijing.volces.com"
  region: cn-beijing

# 百度云 BOS
- name: "百度云 BOS"
  ak: AK_EXAMPLE
  sk: YOUR_SECRET_KEY
  buckets:
    - my-bos-bucket
  endpoint: "https://s3.bj.bcebos.com"
  region: bj

# AWS S3（标准，endpoint 可省略）
- name: "AWS S3 (us-east-1)"
  ak: qiuyrhfihaooa
  sk: YOUR_SECRET_KEY
  buckets: []
  endpoint: ""            # 留空即使用 AWS 官方 endpoint
  region: us-east-1
